name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  bundle_mac_aarch64:
    runs-on: macos-15
    timeout-minutes: 360
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Select release channel from tag
        run: |
          version="$(script/get-crate-version zed)"
          case "$GITHUB_REF_NAME" in
            v*-pre)
              channel="preview"
              expected_tag="v${version}-pre"
              ;;
            v*)
              channel="stable"
              expected_tag="v${version}"
              ;;
            *)
              echo "Unsupported release tag: $GITHUB_REF_NAME"
              exit 1
              ;;
          esac

          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Zed version $version; expected $expected_tag"
            exit 1
          fi

          echo "$channel" > crates/zed/RELEASE_CHANNEL
          echo "Building Zed $version on the $channel channel"

      - name: Cache Cargo dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          check-latest: true

      - name: Build macOS arm64 release
        run: ./script/bundle-mac aarch64-apple-darwin

      - name: Upload Zed DMG
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Zed-aarch64.dmg
          path: target/aarch64-apple-darwin/release/Zed-aarch64.dmg
          if-no-files-found: error

      - name: Upload macOS arm64 remote server
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: zed-remote-server-macos-aarch64.gz
          path: target/zed-remote-server-macos-aarch64.gz
          if-no-files-found: error

  publish_release:
    needs:
      - bundle_mac_aarch64
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          if ! gh release view "$tag" --repo="$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [[ "$tag" == *-pre ]]; then
              gh release create "$tag" --repo="$GITHUB_REPOSITORY" --title="$tag" --generate-notes --prerelease
            else
              gh release create "$tag" --repo="$GITHUB_REPOSITORY" --title="$tag" --generate-notes
            fi
          fi

          gh release upload "$tag" \
            release-artifacts/Zed-aarch64.dmg \
            release-artifacts/zed-remote-server-macos-aarch64.gz \
            --repo="$GITHUB_REPOSITORY" \
            --clobber

      - name: Validate release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets="$(gh release view "$GITHUB_REF_NAME" --repo="$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          for expected in Zed-aarch64.dmg zed-remote-server-macos-aarch64.gz; do
            if ! grep -qx "$expected" <<<"$assets"; then
              echo "Missing release asset: $expected"
              exit 1
            fi
          done

  push_release_update_notification:
    needs:
      - bundle_mac_aarch64
      - publish_release
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Report release result
        env:
          BUNDLE_RESULT: ${{ needs.bundle_mac_aarch64.result }}
          PUBLISH_RESULT: ${{ needs.publish_release.result }}
        run: |
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          release_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME"

          if [ "$BUNDLE_RESULT" != "success" ]; then
            message="❌ macOS arm64 release build failed for $GITHUB_REF_NAME: $run_url"
          elif [ "$PUBLISH_RESULT" != "success" ]; then
            message="❌ Release publishing failed for $GITHUB_REF_NAME: $run_url"
          else
            message="✅ Release $GITHUB_REF_NAME published successfully: $release_url"
          fi

          echo "### $message" >> "$GITHUB_STEP_SUMMARY"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
